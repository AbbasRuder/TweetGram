name: Hourly Tech Tweet Scraper
on:
    schedule:
        # Runs at minute 0 past every hour from 8 AM to 7 PM UTC.
        # Adjust these hours to fit your timezone (IST = UTC + 5:30).
        # For 1:30 PM to 1:30 AM IST, use: '0 8-19 * * *'
        - cron: '0 8-19 * * *'
    workflow_dispatch: # Allows manual triggering from the GitHub Actions UI

jobs:
    scrape-and-send:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout Repository
              uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: '20'

            - name: Install Dependencies
              run: npm install

            - name: Run Bot Script
              env:
                  APIFY_TOKEN: ${{ secrets.APIFY_TOKEN }}
                  APIFY_ACTOR_ID: ${{ secrets.APIFY_ACTOR_ID }}
                  TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
                  TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
                  GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
              run: node index.js
